<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#7c3aed" />
    <title>kHost Cue</title>
    <base href="/" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="KHost.Mobile.styles.css" />
    <link rel="icon" href="data:,">
    <script>
        // Apply a saved theme before first paint so there's no light/dark flash on launch.
        (function () {
            try {
                var t = localStorage.getItem('kh-theme');
                if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
            } catch (e) { /* localStorage unavailable — fall back to OS preference */ }
        })();
    </script>
</head>

<body>

    <div class="status-bar-safe-area"></div>

    <div id="app">
        <div class="app-splash">
            <div class="app-splash__mark">kH</div>
            <div class="app-splash__name">Cue</div>
        </div>
    </div>

    <div id="blazor-error-ui" data-nosnippet>
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="_framework/blazor.webview.js" autostart="false"></script>
    <script src="js/swipe.js"></script>
    <script src="js/range.js"></script>
    <script src="js/numeric-input.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/scroll.js"></script>

</body>

</html>
